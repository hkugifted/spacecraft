<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spacecraft</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        #stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, #fff, transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(1px 1px at 130px 80px, #eee, transparent),
                radial-gradient(1px 1px at 160px 20px, #fff, transparent);
            background-repeat: repeat;
            background-size: 250px 120px;
            animation: twinkle 4s infinite;
            z-index: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            z-index: 1; /* Ensures the 3D canvas sits securely on top of the background */
        }

        #instructions {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 100;
            text-align: center;
            width: 100%;
            pointer-events: none; 
        }

        #resetBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            z-index: 100;
        }

        #resetBtn:hover {
            background: linear-gradient(45deg, #45a049, #4CAF50);
            transform: translateY(-2px);
        }

        #remark {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #aaa;
            font-style: italic;
            z-index: 100;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }

        /* --- PORTRAIT LOCK SCREEN CSS --- */
        #portrait-lock {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(9, 10, 15, 0.95);
            backdrop-filter: blur(5px);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .phone-icon {
            width: 50px;
            height: 80px;
            border: 4px solid white;
            border-radius: 8px;
            margin-bottom: 25px;
            position: relative;
            animation: rotateDevice 2s infinite ease-in-out;
        }

        .phone-icon::after {
            content: '';
            position: absolute;
            bottom: 6px; left: 50%;
            transform: translateX(-50%);
            width: 12px; height: 12px;
            background: white;
            border-radius: 50%;
        }

        @keyframes rotateDevice {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }

        /* Only trigger lock screen if vertical AND it's a mobile device size */
        @media (orientation: portrait) and (max-width: 768px) {
            #portrait-lock {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div id="stars"></div>
    
    <div id="portrait-lock">
        <div class="phone-icon"></div>
        <h2>請將手機旋轉至橫向模式</h2>
        <p>Please rotate your device to landscape mode</p>
    </div>

    <button id="resetBtn">RESET</button>
    <div id="instructions">一起來排列太空載具！</div>
    <div id="container"></div>
    <div id="remark">*不按比例呈現</div>

    <!-- Three.js and loaders -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const spacecraftData = [
            { url: 'https://cdn.jsdelivr.net/gh/cocoli1120/sputnik1@main/sputnik1.glb', label: '史普尼克一號' },
            { url: 'https://cdn.jsdelivr.net/gh/cocoli1120/vostok1@main/vostok1.glb', label: '東方一號' },
            { url: 'https://cdn.jsdelivr.net/gh/cocoli1120/apollo11@main/apollo11.glb', label: '阿波羅十一號' },
            { url: 'https://cdn.jsdelivr.net/gh/cocoli1120/salyut1@main/salyut1.glb', label: '禮炮一號' },
            { url: 'https://cdn.jsdelivr.net/gh/cocoli1120/columbia@main/columbia.glb', label: '哥倫比亞號' },
            { url: 'https://cdn.jsdelivr.net/gh/cocoli1120/opportunity@main/opportunity.glb', label: '機遇號' },
            { url: 'https://cdn.jsdelivr.net/gh/cocoli1120/starship@main/starship.glb', label: '星艦' }
        ];

        const BASE_SCALE = 4.2;
        const MAX_BOUNDING_SIZE = 8.5;
        const SPACING_MULTIPLIER = 8.0;
        const LABEL_SPACING = 9.5;

        class SpacecraftDisplay {
            constructor() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                // Alpha allows the stars background to show through perfectly
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.spacecraftGroups = [];
                this.textGroups = [];
                this.allDraggableGroups = [];
                this.raycaster = new THREE.Raycaster();
                this.pointer = new THREE.Vector2();
                this.selectedGroup = null;
                
                this.dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
                this.dragOffset = new THREE.Vector3();

                this.init();
                this.setupEventListeners();
                this.loadSpacecrafts();
            }

            init() {
                const container = document.getElementById('container');
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = false;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.4;
                container.appendChild(this.renderer.domElement);

                const ambientLight = new THREE.AmbientLight(0x606060, 1.0);
                this.scene.add(ambientLight);

                const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.5);
                dirLight1.position.set(10, 10, 5);
                this.scene.add(dirLight1);

                const dirLight2 = new THREE.DirectionalLight(0x88aaff, 0.7);
                dirLight2.position.set(-5, 5, 5);
                this.scene.add(dirLight2);

                const dirLight3 = new THREE.DirectionalLight(0xffaa88, 0.6);
                dirLight3.position.set(0, -5, 10);
                this.scene.add(dirLight3);

                this.camera.position.set(0, 2.5, 32);
                this.camera.lookAt(0, 0, 0); // Explicitly lock camera to center

                this.animate();
            }

            computeBoundingBoxScale(model) {
                const box = new THREE.Box3().setFromObject(model);
                const size = new THREE.Vector3();
                box.getSize(size);
                const maxDim = Math.max(size.x, size.y, size.z);
                return Math.min(BASE_SCALE, MAX_BOUNDING_SIZE / maxDim);
            }

            createTextLabel(text) {
                const dpr = window.devicePixelRatio || 1; 
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');

                const baseWidth = 1024;
                const baseHeight = 256;

                canvas.width = baseWidth * dpr;
                canvas.height = baseHeight * dpr;
                context.scale(dpr, dpr);

                context.fillStyle = 'rgba(0, 0, 0, 0)';
                context.fillRect(0, 0, baseWidth, baseHeight);

                context.font = 'bold 140px Arial, Microsoft JhengHei, sans-serif';
                context.fillStyle = '#ffffff';
                context.textAlign = 'center';
                context.textBaseline = 'middle';
                context.strokeStyle = '#000000';
                context.lineWidth = 6;
                
                context.strokeText(text, baseWidth / 2, baseHeight / 2);
                context.fillText(text, baseWidth / 2, baseHeight / 2);

                const texture = new THREE.CanvasTexture(canvas);
                texture.minFilter = THREE.LinearFilter;
                texture.magFilter = THREE.LinearFilter;

                const textGeometry = new THREE.PlaneGeometry(8, 2);
                const textMaterial = new THREE.MeshBasicMaterial({ 
                    map: texture, 
                    transparent: true, 
                    opacity: 0.95,
                    side: THREE.DoubleSide
                });

                const textMesh = new THREE.Mesh(textGeometry, textMaterial);
                const textGroup = new THREE.Group();
                textGroup.add(textMesh);
                textGroup.userData = { isText: true };
                return textGroup;
            }

            arrangeLabelsRandomly(labels) {
                const shuffled = [...labels].sort(() => Math.random() - 0.5);
                const startX = -(shuffled.length - 1) * LABEL_SPACING / 2;
                shuffled.forEach((textGroup, i) => {
                    textGroup.position.set(startX + i * LABEL_SPACING, -12, 0);
                });
            }

            async loadSpacecrafts() {
                const shuffledData = [...spacecraftData].sort(() => Math.random() - 0.5);
                const loader = new GLTFLoader();
                
                const loadPromises = shuffledData.map((data, i) => {
                    return loader.loadAsync(data.url).then((gltf) => {
                        const spacecraftGroup = new THREE.Group();
                        const model = gltf.scene;
                        
                        const scale = this.computeBoundingBoxScale(model);
                        model.scale.setScalar(scale);
                        
                        model.traverse((child) => {
                            if (child.isMesh) {
                                child.material.emissive = new THREE.Color(0x202020);
                            }
                            if (child.type === 'ArrowHelper' || 
                                child.name.toLowerCase().includes('arrow') ||
                                child.name.toLowerCase().includes('helper') ||
                                child.name.toLowerCase().includes('axis') ||
                                child.geometry?.type === 'SphereGeometry') {
                                child.visible = false;
                            }
                        });

                        spacecraftGroup.add(model);
                        spacecraftGroup.position.set(
                            (i - shuffledData.length / 2 + 0.5) * SPACING_MULTIPLIER,
                            0, 0
                        );
                        
                        spacecraftGroup.userData = { index: i, isText: false };
                        
                        this.scene.add(spacecraftGroup);
                        this.spacecraftGroups.push(spacecraftGroup);
                        this.allDraggableGroups.push(spacecraftGroup);
                    }).catch(err => {
                        // Error handling ensures a single failed URL doesn't crash the texts
                        console.error(`Failed to load ${data.label}:`, err);
                    });
                });

                // Await all downloads (successful or failed)
                await Promise.all(loadPromises);

                shuffledData.forEach((data) => {
                    const textGroup = this.createTextLabel(data.label);
                    this.scene.add(textGroup);
                    this.textGroups.push(textGroup);
                    this.allDraggableGroups.push(textGroup);
                });

                this.arrangeLabelsRandomly(this.textGroups);
            }

            setupEventListeners() {
                const container = this.renderer.domElement;
                container.addEventListener('pointerdown', (event) => this.onPointerDown(event));
                container.addEventListener('pointermove', (event) => this.onPointerMove(event));
                container.addEventListener('pointerup', () => this.onPointerUp());
                container.addEventListener('pointercancel', () => this.onPointerUp());
                container.addEventListener('pointerleave', () => this.onPointerUp());
                
                window.addEventListener('resize', () => this.onWindowResize());
                document.getElementById('resetBtn').addEventListener('click', () => window.location.reload());
            }

            onPointerDown(event) {
                const rect = this.renderer.domElement.getBoundingClientRect();
                this.pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                this.pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

                this.raycaster.setFromCamera(this.pointer, this.camera);
                const intersects = this.raycaster.intersectObjects(this.allDraggableGroups, true);

                if (intersects.length > 0) {
                    this.selectedGroup = this.findParentGroup(intersects[0].object);
                    
                    this.raycaster.ray.intersectPlane(this.dragPlane, this.dragOffset);
                    if (this.dragOffset) {
                        this.dragOffset.sub(this.selectedGroup.position);
                    }
                }
            }

            findParentGroup(object) {
                let parent = object.parent;
                while (parent && !this.allDraggableGroups.includes(parent)) {
                    parent = parent.parent;
                }
                return parent;
            }

            onPointerMove(event) {
                if (!this.selectedGroup) return;

                const rect = this.renderer.domElement.getBoundingClientRect();
                this.pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                this.pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

                this.raycaster.setFromCamera(this.pointer, this.camera);
                const intersectPoint = new THREE.Vector3();
                this.raycaster.ray.intersectPlane(this.dragPlane, intersectPoint);
                
                if (intersectPoint) {
                    this.selectedGroup.position.copy(intersectPoint).sub(this.dragOffset);
                }
            }

            onPointerUp() {
                this.selectedGroup = null;
            }

            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.renderer.render(this.scene, this.camera);
            }
        }

        window.addEventListener('load', () => new SpacecraftDisplay());
    </script>
</body>
</html>
